<!DOCTYPE html>
<html lang="ko">
  <head>
    <title>퍼블가이드</title>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="keyword" content="" />
    <meta name="description" content="퍼블가이드" />
    <meta name="author" content="이솔" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- S: css -->
    <link rel="stylesheet" type="text/css" href="../assets/css/jquery-ui.min.css" />
    <link rel="stylesheet" type="text/css" href="../assets/css/style.css" />
    <link rel="stylesheet" type="text/css" href="../assets/css/utilities.css" />
    <link rel="stylesheet" type="text/css" href="../assets/css/reset.css" />
    <link rel="stylesheet" type="text/css" href="../assets/css/guide.css" />
    <link rel="stylesheet" type="text/css" href="../assets/css/common.css" />
    <!-- E: css -->

    <!-- S: js -->
    <script type="text/javascript" src="../assets/js/jquery-1.9.1.min.js"></script>
    <script type="text/javascript" src="../assets/js/jquery-ui-1.12.1.js"></script>
    <script type="text/javascript" src="../assets/js/swiper-bundle.min.js"></script>
    <!-- index.js가 common.js보다 먼저 로드되어야 한다. 그래야 statusManager가 존재  -->
    <!-- 상태 관리 전용 모듈 -->
    <script type="text/javascript" src="../assets/js/index.js"></script>
    <!-- SPA 로딩 전용 -->
    <script type="text/javascript" src="../assets/js/common.js"></script>
    <!-- 컴포넌트.js -->
    <script type="text/javascript" src="../assets/js/components.js"></script>
    <!-- 가이드 전용 탭.js -->
    <script type="text/javascript" src="../assets/js/previewTabs.js"></script>
    <!-- E: js -->
</head>
<body>
    <div class="wrap">
        <!-- S: 사이드메뉴 or 헤더 -->
        <div data-include-path=""></div>
        <!-- E: 사이드메뉴 or 헤더 -->

        <main class="contentWrap">
            <!-- S: 본문 -->
            <section class="page-container">
                <div id="root">
                    <header class="guide-header">
                        <h1>Design System Guide</h1>
                        <p>공통 컴포넌트 가이드 워크리스트(웹접근성 적용)</p>
                    </header>
                    <div class="guide-container">
                        <aside class="component-list">
                            <h2 class="status-item">Components <span id="totCnt"></span>개</h2>
				            <ul class="status-summary">
					            <li class="status-item"><span class="status-dot">완료</span> <span id="compCnt"></span></li>
					            <li class="status-item"><span class="status-dot">진행중</span> <span id="progressCnt"></span></li>
					            <li class="status-item"><span class="status-dot">대기</span> <span id="atmosphere"></span></li>
				            </ul>
                            <div class="component-items">
                                <ul>
                                    <li>
                                        <p class="tit">INPUTS</p>
                                        <ul>
                                            <li class="component-item non">
                                                <a class="component-info" data-include-path="./guide/input/Autocomplete.html">
                                                    <span class="component-name">Autocomplete</span>
                                                    <span class="status-badge"></span>
                                                </a>
                                            </li>
                                            <li class="component-item non">
                                                <a class="component-info" data-include-path="./guide/input/Button.html">
                                                    <span class="component-name">Button</span>
                                                    <span class="status-badge"></span>
                                                </a>
                                            </li>
                                            <li class="component-item non">
                                                <a class="component-info" data-include-path="./guide/input/Button-Group.html">
                                                    <span class="component-name">Button Group</span>
                                                    <span class="status-badge"></span>
                                                </a>
                                            </li>
                                            <li class="component-item non">
                                                <a class="component-info" data-include-path="./guide/input/Checkbox.html">
                                                    <span class="component-name">Checkbox</span>
                                                    <span class="status-badge"></span>
                                                </a>
                                            </li>
                                        </ul>
                                    </li>
                                    <li>
                                        <p class="tit">DATA DISPLAY</p>
                                        <ul>
                                            <li class="component-item non">
                                                <a class="component-info" data-include-path="./guide/data/aspect-ratio.html">
                                                    <span class="component-name">Aspect Ratio</span>
                                                    <span class="status-badge"></span>
                                                </a>
                                            </li>
                                        </ul>
                                    </li>
                                    <li>
                                        <p class="tit">FEEDBACK</p>
                                        <ul>
                                            <li class="component-item non">
                                                <a class="component-info" data-include-path="./guide/feedback/alert.html">
                                                    <span class="component-name">Alert</span>
                                                    <span class="status-badge"></span>
                                                </a>
                                            </li>
                                            <li class="component-item non">
                                                <a class="component-info" data-include-path="./guide/feedback/badge.html">
                                                    <span class="component-name">Badge</span>
                                                    <span class="status-badge"></span>
                                                </a>
                                            </li>
                                        </ul>
                                    </li>
                                </ul>
                            </div>
                        </aside>
                        <section class="iframe_view">
                            <div id="component-view"></div>
                        </section>
                    </div>
                </div>
            </section>
            <!-- E: 본문 -->
        </main>

        <!-- S: 푸터 -->
        <div data-include-path=""></div>
        <!-- E: 푸터 -->
    </div>
</body>
</html>
