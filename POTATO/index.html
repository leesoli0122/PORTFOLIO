    <!-- 상단 상태바 색상: default / black / black-translucent -->
    <meta name="apple-mobile-web-app-status-bar-style" content="default">

    <!-- 홈 화면에 표시될 앱 이름 -->
    <meta name="apple-mobile-web-app-title" content="이모티콘 메이커">

    <!-- 홈 화면 아이콘 (없으면 스크린샷으로 자동 생성됨, 있으면 더 예쁨)
         assets/images/icon-180.png 파일을 직접 만들어서 넣으면 적용됩니다.
         180x180px PNG 권장. 없어도 앱 동작에는 문제 없습니다. -->
    <!-- <link rel="apple-touch-icon" href="assets/images/icon-180.png"> -->

    <!-- 일반 브라우저 파비콘 (선택 사항) -->
    <!-- <link rel="icon" href="assets/images/favicon.ico"> -->

    <link rel="stylesheet" href="assets/css/style.css">

<div class="app-wrapper">

    <!-- 헤더 -->
    <header class="app-header">
        <h1>🎨 이모티콘 메이커</h1>
    </header>

    <!-- 메인 영역 -->
    <main class="app-main">

        <!-- 왼쪽: 캐릭터 미리보기 -->
        <section class="preview-section">
            <h2>미리보기</h2>
            <div class="canvas-wrapper">
                <!--
                    캔버스 크기: 500x500 (고해상도 저장을 위해 500으로 설정)
                    CSS로 240x240으로 축소해서 표시하지만, 실제 저장은 500px 기준입니다.
                -->

            </div>
            <div class="preview-actions">
                <button id="btn-save">💾 저장</button>
                <button id="btn-reset">🔄 초기화</button>
            </div>
        </section>

        <!-- 오른쪽: 파츠 선택 -->
        <section class="parts-section">

            <!-- 탭 메뉴 -->
            <nav class="tab-bar" role="tablist">
                <!--
                    탭 버튼은 parts-config.js의 tabs 배열을 기반으로
                    JS에서 동적으로 생성해도 되지만, 여기서는 HTML에 직접 작성합니다.

                -->

                <button class="tab-btn"        data-tab="ear"        role="tab">귀</button>
                <button class="tab-btn"        data-tab="outfit"     role="tab">옷</button>
                <button class="tab-btn"        data-tab="pose"       role="tab">포즈</button>
                <button class="tab-btn"        data-tab="background" role="tab">배경</button>
            </nav>

            <!-- 현재 탭 제목 -->
            <p class="parts-tab-title" id="tab-title">얼굴</p>

            <!-- 파츠 카드 목록 (JS에서 동적으로 채워집니다) -->
            <div id="parts-grid" role="tabpanel"></div>

        </section>

    </main>

</div>

    1. parts-config.js 먼저 로드 (PARTS_CONFIG 객체 정의)
    2. app.js 이후 로드 (PARTS_CONFIG를 사용하기 때문)
-->
<script src="assets/js/parts-config.js"></script>
<script src="assets/js/app.js"></script>

</body>
