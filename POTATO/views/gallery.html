<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>갤러리 — 이모티콘 메이커</title>

    <!-- S: css -->
    <link rel="preconnect" href="assets/css/base/font.css">
    <link rel="stylesheet" href="../assets/css/base/reset.css">
    <link rel="stylesheet" href="../assets/css/base/animations.css">
    <link rel="stylesheet" href="../assets/css/components/button.css">
    <link rel="stylesheet" href="../assets/css/components/header.css">
    <link rel="stylesheet" href="../assets/css/components/modal.css">
    <link rel="stylesheet" href="../assets/css/components/toast.css">
    <link rel="stylesheet" href="../assets/css/pages/gallery.css">
    <link rel="stylesheet" href="../assets/css/responsive.css">
    <!-- E: css -->

    <!-- S: js -->
    <!-- E: js -->
</head>
<body>
    <div class="wrap">
        <!-- S: 사이드메뉴 or 헤더 -->
        <div data-include-path=""></div>
        <!-- E: 사이드메뉴 or 헤더 -->

        <main class="contentWrap">
            <!-- S: 본문 -->
            <section class="page-container">
                <div id="page-gallery">

                    <header class="sub-header">
                        <a class="back-btn" href="../index.html">← 뒤로</a>
                        <h1 class="sub-header-title">🖼️ 갤러리</h1>
                        <div class="sub-header-right">
                            <span id="gallery-count" class="gallery-count-badge">0개</span>
                        </div>
                    </header>

                    <!-- 카테고리 탭 바 -->
                    <div class="category-bar-wrap">
                        <div id="category-tab-bar" class="category-tab-bar"></div>
                        <button id="btn-add-category" class="category-add-btn" title="카테고리 추가">＋</button>
                    </div>

                    <div class="gallery-layout">
                        <div id="gallery-grid" class="gallery-grid"></div>
                        <div id="gallery-empty" class="gallery-empty hidden">
                            <p>아직 저장된 이모티콘이 없어요</p>
                            <a class="action-btn btn-primary" href="maker.html">캐릭터 만들러 가기 →</a>
                        </div>
                    </div>

                </div>

                <!-- 이미지 상세 모달 -->
                <div id="modal-overlay" class="modal-overlay hidden">
                    <div class="modal-box">
                        <img id="modal-img" src="" alt="이모티콘 미리보기">
                        <div class="modal-name-row">
                            <span id="modal-name" class="modal-name-label"></span>
                            <button id="modal-name-edit" class="modal-name-edit-btn" title="이름 수정">✏️</button>
                        </div>
                        <div class="modal-category-row">
                            <label class="modal-category-label">카테고리</label>
                            <select id="modal-category-select" class="modal-category-select">
                                <option value="">미분류</option>
                            </select>
                        </div>
                        <div class="modal-actions">
                            <button id="modal-download" class="action-btn btn-primary">⬇️ 다운로드</button>
                            <button id="modal-delete"   class="action-btn btn-danger">🗑️ 삭제</button>
                            <button id="modal-close"    class="action-btn btn-secondary">닫기</button>
                        </div>
                        <p class="modal-date" id="modal-date"></p>
                    </div>
                </div>

                <!-- 이름 입력 모달 -->
                <div id="name-modal-overlay" class="modal-overlay hidden">
                    <div class="modal-box name-modal-box">
                        <h2 class="name-modal-title">이름을 붙여주세요 🎉</h2>
                        <p class="name-modal-desc">이름을 입력하지 않으면 자동으로 설정돼요</p>
                        <input id="name-modal-input" class="name-modal-input" type="text"
                               placeholder="emoji_YYYYMMDD_HHMMSS" maxlength="40">
                        <div class="name-modal-category-row">
                            <label class="modal-category-label">카테고리</label>
                            <select id="name-modal-category" class="modal-category-select">
                                <option value="">미분류</option>
                            </select>
                        </div>
                        <div class="modal-actions">
                            <button id="name-modal-confirm" class="action-btn btn-primary">저장</button>
                            <button id="name-modal-skip"    class="action-btn btn-secondary">건너뛰기</button>
                        </div>
                    </div>
                </div>

                <!-- 카테고리 추가 모달 -->
                <div id="cat-modal-overlay" class="modal-overlay hidden">
                    <div class="modal-box name-modal-box">
                        <h2 class="name-modal-title">카테고리 추가</h2>
                        <input id="cat-modal-input" class="name-modal-input" type="text"
                               placeholder="카테고리 이름 입력" maxlength="20">
                        <div class="modal-actions">
                            <button id="cat-modal-confirm" class="action-btn btn-primary">추가</button>
                            <button id="cat-modal-cancel"  class="action-btn btn-secondary">취소</button>
                        </div>
                    </div>
                </div>

                <div id="toast" class="toast hidden"></div>
            </section>
            <!-- E: 본문 -->
        </main>

        <!-- S: 푸터 -->
        <div data-include-path=""></div>
        <!-- E: 푸터 -->
    </div>

    <script src="../assets/js/core/db.js"></script>
    <script src="../assets/js/pages/gallery.js"></script>

</body>
</html>
